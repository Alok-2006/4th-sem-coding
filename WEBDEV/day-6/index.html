<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            background:white;
        }

        h1{
            margin-top:40px;
            color:#2c2c6c;
        }

        .board{
            display:grid;
            grid-template-columns:repeat(3,100px);
            gap:10px;
            justify-content:center;
            margin-top:20px;
        }

        .box{
            width:100px;
            height:100px;
            border:3px solid #555;
            font-size:40px;
            cursor:pointer;
            background:white;
        }

        .reset{
            margin-top:30px;
            padding:10px 20px;
            font-size:18px;
            cursor:pointer;
        }
    </style>
</head>

<body>

    <h1>Tic Tac Toe</h1>

    <div class="board">
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>

        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>

        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
    </div>
    
    <button class="reset">Reset Game</button>
 <script src="index.js"></script>
</body>
</html>
