<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <h2></h2>
</head>
<body>
    <h2></h2>
    <script>
        //API(application programming interface)

    let h2= document.querySelector("h2")
    fetch('https://jsonplaceholder.typicode.com/todos/1').then((data)=>{
       // console.log(data);
       return data.json()
        
    }).then((val)=>{
        console.log(val);
       // h2.innerText=val[1].title

        val.forEach((item)=>{
        h2.innerHTML += item.title + "<br></br>";
            
        })
        })
    
    .catch((err)=>{
        console.log(err);
        
    })

    </script>
</body>
</html>
